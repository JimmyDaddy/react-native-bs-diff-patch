pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,ts,jsx,tsx}"
      run: node node_modules/eslint/bin/eslint.js {staged_files}
    types:
      glob: "*.{js,ts,jsx,tsx}"
      run: node node_modules/typescript/bin/tsc --noEmit
commit-msg:
  parallel: true
  commands:
    commitlint:
      run: node node_modules/@commitlint/cli/cli.js --edit
