version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '03:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    groups:
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: bundler
    directory: /example
    schedule:
      interval: monthly
      day: monday
      time: '03:30'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    groups:
      ruby-toolchain:
        patterns:
          - '*'
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: '04:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
